name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mvp/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: mvp/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check app/ --exit-zero

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mvp/backend
    env:
      ENVIRONMENT: testing
      SECRET_KEY: test-secret-key-ci
      DATABASE_URL: sqlite+aiosqlite:///test.db
      REDIS_URL: ""
      ASSEMBLYAI_API_KEY: MOCK
      GEMINI_API_KEY: MOCK
      CLAUDE_API_KEY: MOCK
      GROQ_API_KEY: MOCK
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: mvp/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiosqlite
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run unit tests
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=app --cov-report=xml --cov-report=term

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: mvp/backend/test-results.xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          file: mvp/backend/coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mvp/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: mvp/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check and build
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8004

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'mvp/backend'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
