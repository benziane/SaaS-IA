version: 2
updates:
  # Backend Python dependencies
  - package-ecosystem: pip
    directory: /mvp/backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "chore(deps)"
      include: scope
    # Auto-create PRs for security updates regardless of schedule
    groups:
      python-security:
        applies-to: security-updates
      python-minor:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # Frontend npm dependencies
  - package-ecosystem: npm
    directory: /mvp/frontend
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps)"
      include: scope
    versioning-strategy: increase
    groups:
      npm-security:
        applies-to: security-updates
      npm-minor:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # Docker (backend)
  - package-ecosystem: docker
    directory: /mvp/backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # Docker (frontend)
  - package-ecosystem: docker
    directory: /mvp/frontend
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"
      include: scope
