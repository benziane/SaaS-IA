version: 2
updates:
  # Backend Python dependencies
  - package-ecosystem: pip
    directory: /mvp/backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # Frontend npm dependencies
  - package-ecosystem: npm
    directory: /mvp/frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps)"
      include: scope
    versioning-strategy: increase

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # Docker (backend)
  - package-ecosystem: docker
    directory: /mvp/backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # Docker (frontend)
  - package-ecosystem: docker
    directory: /mvp/frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"
      include: scope
