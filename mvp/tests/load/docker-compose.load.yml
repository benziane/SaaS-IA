##
## SaaS-IA Load Testing -- Docker Compose
##
## Runs a Locust distributed load test with a master node (web UI)
## and configurable worker replicas.
##
## Usage:
##   docker compose -f docker-compose.load.yml up -d                         # start
##   docker compose -f docker-compose.load.yml up -d --scale locust-worker=8 # 8 workers
##   docker compose -f docker-compose.load.yml down                          # stop
##
## Web UI: http://localhost:8089
##

services:
  locust-master:
    image: locustio/locust:2.32.4
    container_name: saasia-locust-master
    ports:
      - "8089:8089"
    volumes:
      - ./:/mnt/locust:ro
    environment:
      - SAASIA_BASE_URL=${SAASIA_BASE_URL:-http://host.docker.internal:8004}
      - SAASIA_USER=${SAASIA_USER:-demo@saas-ia.com}
      - SAASIA_PASSWORD=${SAASIA_PASSWORD:-demo123}
      - SAASIA_API_KEY=${SAASIA_API_KEY:-test_api_key_placeholder}
    command: >
      -f /mnt/locust/locustfile.py
      --master
      --host ${SAASIA_BASE_URL:-http://host.docker.internal:8004}
      --expect-workers ${LOCUST_WORKERS:-4}
    networks:
      - load-net
    restart: unless-stopped

  locust-worker:
    image: locustio/locust:2.32.4
    volumes:
      - ./:/mnt/locust:ro
    environment:
      - SAASIA_BASE_URL=${SAASIA_BASE_URL:-http://host.docker.internal:8004}
      - SAASIA_USER=${SAASIA_USER:-demo@saas-ia.com}
      - SAASIA_PASSWORD=${SAASIA_PASSWORD:-demo123}
      - SAASIA_API_KEY=${SAASIA_API_KEY:-test_api_key_placeholder}
    command: >
      -f /mnt/locust/locustfile.py
      --worker
      --master-host locust-master
    depends_on:
      - locust-master
    deploy:
      replicas: ${LOCUST_WORKERS:-4}
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - load-net
    restart: unless-stopped

networks:
  load-net:
    driver: bridge
