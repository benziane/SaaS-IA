# Monitoring stack overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# This adds Jaeger (OpenTelemetry traces), GlitchTip (open-source Sentry),
# and Prometheus to the base SaaS-IA stack.

name: saas-ia

services:
  # Override backend to point at monitoring services
  saas-ia-backend:
    environment:
      OTLP_ENDPOINT: http://jaeger:4317
      SENTRY_DSN: http://key@glitchtip:8080/1

  # Override worker to point at monitoring services
  worker:
    environment:
      OTLP_ENDPOINT: http://jaeger:4317
      SENTRY_DSN: http://key@glitchtip:8080/1

  # Jaeger – OpenTelemetry trace collector & UI
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: saas-ia-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped
    networks:
      - saas-ia-network

  # Prometheus – Metrics scraping
  prometheus:
    image: prom/prometheus:latest
    container_name: saas-ia-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      - saas-ia-backend
    restart: unless-stopped
    networks:
      - saas-ia-network

  # GlitchTip – Open-source Sentry alternative
  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: saas-ia-glitchtip
    ports:
      - "8090:8080"
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://glitchtip:secret@glitchtip-db/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-in-production}
      PORT: "8080"
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8090}
      DEFAULT_FROM_EMAIL: noreply@saas-ia.local
      CELERY_WORKER_AUTOSCALE: "1,3"
    restart: unless-stopped
    networks:
      - saas-ia-network

  glitchtip-db:
    image: postgres:16-alpine
    container_name: saas-ia-glitchtip-db
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: secret
    volumes:
      - glitchtip_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip -d glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - saas-ia-network

  glitchtip-redis:
    image: redis:7-alpine
    container_name: saas-ia-glitchtip-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - saas-ia-network

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: saas-ia-glitchtip-worker
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://glitchtip:secret@glitchtip-db/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-in-production}
      CELERY_WORKER_AUTOSCALE: "1,3"
    restart: unless-stopped
    networks:
      - saas-ia-network

volumes:
  prometheus_data:
  glitchtip_db_data:
