# ============================================================================
# TONE PATTERNS
# ============================================================================
# Regex patterns to detect text tone

tone_patterns:
  academic:
    - '\b(selon|d''après|conformément à|en référence à)\b'
    - '\b(étude|recherche|analyse|conclusion)\b'
    - '\b(notamment|en effet|par conséquent|ainsi|donc)\b'
    - '\b(hypothèse|théorie|modèle|résultat)\b'
  
  formal:
    - '\b(veuillez|nous vous prions|conformément|en vertu de)\b'
    - '\b(article|loi|règlement|décret)\b'
    - '\b(monsieur|madame|cher|chère)\b'
  
  popular:
    - '\b(tu|toi|ton|ta|tes)\b'
    - '[!]{2,}'
    - '\b(super|génial|cool|sympa|top)\b'
    - '\b(salut|coucou|hey)\b'
  
  conversational:
    - '\b(je pense|à mon avis|selon moi)\b'
    - '\b(tu vois|tu sais|tu comprends)\b'
    - '\?+'

# ============================================================================
# MODEL SELECTION STRATEGIES
# ============================================================================
# Define which models to use for each domain based on strategy

model_selection:
  strategies:
    conservative:
      religious: [groq, gpt-4, claude-3-opus]
      scientific: [gpt-4, claude-3, gemini-pro]
      technical: [gpt-4, claude-3, gemini-pro]
      medical: [gpt-4, claude-3-opus]
      legal: [gpt-4, claude-3]
      financial: [gpt-4, claude-3]
      administrative: [gemini-pro, gpt-4]
      narrative: [gemini-pro, claude-3]
      general: [gemini-pro, gemini-flash]
    
    balanced:
      religious: [groq, gemini-pro]
      scientific: [gemini-pro, gpt-4]
      technical: [gemini-pro, gpt-4]
      medical: [gemini-pro, gpt-4]
      legal: [gemini-pro, gpt-4]
      financial: [gemini-pro, gpt-4]
      administrative: [gemini-pro, gemini-flash]
      narrative: [gemini-flash, gemini-pro]
      general: [gemini-flash, groq]
    
    cost_optimized:
      religious: [groq, gemini-flash]
      scientific: [gemini-flash, groq]
      technical: [gemini-flash, groq]
      medical: [gemini-flash, groq]
      legal: [gemini-flash, groq]
      financial: [gemini-flash, groq]
      administrative: [gemini-flash, groq]
      narrative: [gemini-flash, groq]
      general: [gemini-flash, groq]

# ============================================================================
# CONFIDENCE THRESHOLDS
# ============================================================================
# Thresholds for classification confidence levels

confidence_thresholds:
  high: 0.7      # High confidence: use primary strategy
  medium: 0.4    # Medium confidence: consider conservative
  low: 0.2       # Low confidence: force conservative

# ============================================================================
# SENSITIVITY DETECTION
# ============================================================================
# Keywords that trigger sensitivity flags

sensitivity_keywords:
  high:
    - mort
    - décès
    - deuil
    - souffrance
    - tragédie
    - maladie grave
    - cancer
    - suicide
    - violence
    - guerre
  
  medium:
    - santé
    - famille
    - émotion
    - stress
    - anxiété
    - dépression
    - conflit

# ============================================================================
# PROMPT PROFILE MAPPING
# ============================================================================
# Map domains to prompt profiles

prompt_profiles:
  domain_mapping:
    religious: strict
    scientific: strict
    medical: strict
    legal: strict
    technical: technical
    financial: standard
    administrative: standard
    narrative: creative
    general: standard

# ============================================================================
# PERFORMANCE SETTINGS
# ============================================================================

performance:
  max_text_length: 50000  # Maximum text length to analyze (chars)
  cache_ttl: 3600         # Config cache TTL in seconds
  min_keywords_match: 2   # Minimum keywords to consider a domain

# ============================================================================
# LOGGING SETTINGS
# ============================================================================

logging:
  log_classifications: true
  log_model_selections: true
  log_performance_metrics: true
  detailed_keywords: false  # Log all matched keywords (verbose)

