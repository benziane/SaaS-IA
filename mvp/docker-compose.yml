name: saas-ia

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://saas_ia_user:saas_ia_dev_password@postgres:5432/saas_ia
  REDIS_URL: redis://redis:6379
  SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  DEBUG: ${DEBUG:-True}
  # AI Providers
  ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY:-MOCK}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  # Payments
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  STRIPE_PRICE_PRO_MONTHLY: ${STRIPE_PRICE_PRO_MONTHLY:-}
  # CORS
  CORS_ORIGINS: http://localhost:3002,http://localhost:8004
  # Enterprise Observability
  SENTRY_DSN: ${SENTRY_DSN:-}
  OTLP_ENDPOINT: ${OTLP_ENDPOINT:-}
  METRICS_TOKEN: ${METRICS_TOKEN:-}
  # LLM Observability (Langfuse)
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
  LANGFUSE_HOST: ${LANGFUSE_HOST:-}
  # Instagram Intelligence
  INSTAGRAM_USERNAME: ${INSTAGRAM_USERNAME:-}
  INSTAGRAM_PASSWORD: ${INSTAGRAM_PASSWORD:-}
  INSTAGRAM_APP_ID: ${INSTAGRAM_APP_ID:-}
  INSTAGRAM_APP_SECRET: ${INSTAGRAM_APP_SECRET:-}
  INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}

services:
  # SaaS-IA Backend API
  saas-ia-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas-ia-backend
    ports:
      - "8004:8000"
    environment:
      <<: *backend-env
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    stop_grace_period: 45s
    stop_signal: SIGTERM
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - saas-ia-network

  # Celery Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas-ia-worker
    environment:
      <<: *backend-env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      saas-ia-backend:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    stop_grace_period: 120s
    stop_signal: SIGTERM
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping --timeout 10 || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3
    networks:
      - saas-ia-network

  # Flower Monitoring
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas-ia-flower
    ports:
      - "5555:5555"
    environment:
      <<: *backend-env
    depends_on:
      worker:
        condition: service_healthy
    command: celery -A app.celery_app flower --port=5555
    stop_grace_period: 15s
    stop_signal: SIGTERM
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/healthcheck"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - saas-ia-network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: saas-ia-postgres
    environment:
      POSTGRES_USER: saas_ia_user
      POSTGRES_PASSWORD: saas_ia_dev_password
      POSTGRES_DB: saas_ia
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_ia_user -d saas_ia"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - saas-ia-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: saas-ia-redis
    ports:
      - "6382:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - saas-ia-network

  # Mailpit - Dev SMTP Server
  mailpit:
    image: axllent/mailpit:latest
    container_name: saas-ia-mailpit
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    restart: unless-stopped
    networks:
      - saas-ia-network

volumes:
  postgres_data:
  redis_data:

networks:
  saas-ia-network:
    driver: bridge
