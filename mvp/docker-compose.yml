name: saas-ia

services:
  # SaaS-IA Backend API
  saas-ia-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas-ia-backend
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://saas_ia_user:saas_ia_dev_password@postgres:5432/saas_ia
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ENVIRONMENT=development
      - DEBUG=True
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY:-MOCK}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_PRO_MONTHLY=${STRIPE_PRICE_PRO_MONTHLY:-}
      - CORS_ORIGINS=http://localhost:3002,http://localhost:8004
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - saas-ia-network

  # Celery Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas-ia-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://saas_ia_user:saas_ia_dev_password@postgres:5432/saas_ia
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ENVIRONMENT=development
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY:-MOCK}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - ./backend/app:/app/app
    depends_on:
      - saas-ia-backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped
    networks:
      - saas-ia-network

  # Flower Monitoring
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas-ia-flower
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DATABASE_URL=postgresql+asyncpg://saas_ia_user:saas_ia_dev_password@postgres:5432/saas_ia
    depends_on:
      - worker
    command: celery -A app.celery_app flower --port=5555
    restart: unless-stopped
    networks:
      - saas-ia-network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: saas_ia_user
      POSTGRES_PASSWORD: saas_ia_dev_password
      POSTGRES_DB: saas_ia
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_ia_user -d saas_ia"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-ia-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-ia-network

volumes:
  postgres_data:
  redis_data:

networks:
  saas-ia-network:
    driver: bridge
